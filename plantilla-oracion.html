<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oración · El Santísimo Te Espera</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET Y BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #faf3e8;
            color: #2c2c2c;
            font-family: 'Open Sans', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            padding: 1.2rem;
            padding-top: 1rem;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 2rem 1.5rem 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* ===== NAVEGACIÓN STICKY ===== */
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1rem;
            border-radius: 60px;
            max-width: 820px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(184, 148, 76, 0.15);
            flex-wrap: wrap;
        }
        .sticky-nav .nav-left,
        .sticky-nav .nav-right {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .sticky-nav a {
            font-size: 0.8rem;
            text-decoration: none;
            color: #b8944c;
            border: 1px solid #b8944c;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            transition: 0.2s;
            white-space: nowrap;
            font-weight: 400;
        }
        .sticky-nav a:hover {
            background: #b8944c;
            color: #fff;
        }
        .sticky-nav a.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #ccc;
            color: #999;
        }
        .sticky-nav .nav-home {
            background: #faf3e8;
        }

        /* ===== BOTÓN VOLVER ===== */
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            font-family: 'Open Sans', sans-serif;
            font-weight: 400;
            font-size: 0.9rem;
            color: #b8944c;
            text-decoration: none;
            border: 1.5px solid #b8944c;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            transition: background 0.2s, color 0.2s;
        }
        .back-link:hover { background: #b8944c; color: #ffffff; }

        .oracion-title {
            font-family: 'Lora', serif;
            font-weight: 600;
            font-size: 2rem;
            color: #2c2c2c;
            margin-bottom: 1.8rem;
            line-height: 1.2;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            background: #e8ddd0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .ad-comment {
            text-align: center;
            font-size: 0.75rem;
            color: #a09280;
            margin: 0.5rem 0 1.8rem;
            border: 1px dashed #dcd0c0;
            padding: 0.6rem;
            border-radius: 12px;
            background: #f8f2ea;
        }
        .oracion-body {
            font-size: 1.25rem;
            line-height: 1.9;
            text-align: center;
            color: #1f1f1f;
            margin: 1.8rem 0;
        }
        .oracion-body p { margin-bottom: 1.8rem; }
        .oracion-body img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            margin: 1.2rem 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .smartlink-btn {
            display: block;
            width: fit-content;
            margin: 2.5rem auto 1.5rem;
            background: #b8944c;
            color: #ffffff;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 3rem;
            border-radius: 60px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 6px 20px rgba(184, 148, 76, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }
        .smartlink-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 28px rgba(184, 148, 76, 0.4);
        }

        /* ===== WIDGET MÁS ORACIONES ===== */
        .related-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid rgba(201, 169, 110, 0.2);
        }
        .related-section h3 {
            font-family: 'Lora', serif;
            font-weight: 400;
            color: #6b5e4e;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .related-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        .related-card {
            background: #faf3e8;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: #2c2c2c;
            transition: background 0.2s, transform 0.2s;
            border: 1px solid transparent;
        }
        .related-card:hover {
            background: #f5ede2;
            transform: translateX(4px);
            border-color: #b8944c;
        }
        .related-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            background: #e8ddd0;
            flex-shrink: 0;
        }
        .related-card .info {
            flex: 1;
        }
        .related-card .info h4 {
            font-family: 'Lora', serif;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }
        .related-card .info p {
            font-size: 0.8rem;
            color: #6b5e4e;
            margin: 0;
        }
        .related-card .info .mini-btn {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            border: 1px solid #b8944c;
            color: #b8944c;
            padding: 0.1rem 0.8rem;
            border-radius: 20px;
        }
        .ad-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #a09280;
            border-top: 1px solid #eee4d8;
            padding-top: 1.5rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 600px) {
            body { padding: 2rem; }
            .container { padding: 3rem 2.5rem; }
            .oracion-title { font-size: 2.4rem; }
            .oracion-body { font-size: 1.4rem; }
            .related-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 768px) {
            .related-grid { grid-template-columns: repeat(4, 1fr); }
            .related-card { flex-direction: column; text-align: center; padding: 1.2rem; }
            .related-card img { width: 100%; height: 140px; }
        }
        @media (max-width: 500px) {
            .sticky-nav .nav-left a span, .sticky-nav .nav-right a span { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== BARRA STICKY ===== -->
    <nav class="sticky-nav" id="stickyNav">
        <div class="nav-left">
            <a href="index.html" class="nav-home">🏠 Inicio</a>
            <a href="#" id="prevLink" class="disabled">‹ <span>Anterior</span></a>
        </div>
        <div class="nav-right">
            <a href="#" id="nextLink" class="disabled"><span>Siguiente</span> ›</a>
        </div>
    </nav>

    <div class="container">

        <a href="index.html" class="back-link">← Volver al inicio</a>
        <h1 class="oracion-title" id="oracionTitle">Cargando...</h1>

        <div class="video-wrapper">
            <iframe id="videoIframe" src="https://videy.co/embed/ejemplo" allowfullscreen loading="lazy"></iframe>
        </div>

        <!-- [CÓDIGO PUBLICITARIO 1] -->
        <div class="ad-comment">[ Espacio para publicidad ]</div>

        <div class="oracion-body" id="oracionBody">
            <p>Señor, en este momento de silencio pongo mi corazón en tus manos...</p>
            <img src="https://via.placeholder.com/800x400/e8ddd0/2c2c2c?text=Imagen+de+oración" alt="Imagen espiritual" />
            <p>Derrama tu paz sobre mi hogar...</p>
            <p>Amén.</p>
        </div>

        <a href="#" class="smartlink-btn">Recibe tu bendición aquí</a>

        <!-- ===== WIDGET "MÁS ORACIONES" ===== -->
        <div class="related-section">
            <h3>✦ Más oraciones para ti ✦</h3>
            <div class="related-grid" id="relatedGrid">
                <!-- Generado por JavaScript -->
            </div>
        </div>

        <!-- [CÓDIGO PUBLICITARIO 2] -->
        <div class="ad-footer">[ Espacio para publicidad ]</div>

    </div>

    <!-- ========================================================= -->
    <!-- CARGA PRIMERO EL ARCHIVO DE DATOS (EXTERNO)               -->
    <!-- ========================================================= -->
    <script src="oraciones-data.js"></script>

    <!-- ========================================================= -->
    <!-- SCRIPT PRINCIPAL (usa la variable global 'misOraciones')   -->
    <!-- ========================================================= -->
    <script>
        (function() {
            // Verificar que los datos se cargaron
            if (typeof misOraciones === 'undefined' || misOraciones.length === 0) {
                console.warn('No se encontraron oraciones. Verifica oraciones-data.js');
                document.getElementById('oracionTitle').textContent = 'Oración no encontrada';
                return;
            }

            const currentPath = window.location.pathname;
            const currentFileName = currentPath.substring(currentPath.lastIndexOf('/') + 1);

            let currentIndex = -1;
            for (let i = 0; i < misOraciones.length; i++) {
                const urlParts = misOraciones[i].url.split('/');
                const fileName = urlParts[urlParts.length - 1];
                if (fileName === currentFileName) {
                    currentIndex = i;
                    break;
                }
            }

            if (currentIndex === -1) {
                document.getElementById('stickyNav').style.display = 'none';
                document.getElementById('oracionTitle').textContent = 'Oración no encontrada';
                return;
            }

            const currentItem = misOraciones[currentIndex];

            // Actualizar título
            document.title = currentItem.titulo + ' · El Santísimo Te Espera';
            document.getElementById('oracionTitle').textContent = currentItem.titulo;

            // Configurar botones Anterior / Siguiente
            const prevLink = document.getElementById('prevLink');
            const nextLink = document.getElementById('nextLink');

            if (currentIndex > 0) {
                prevLink.href = misOraciones[currentIndex - 1].url;
                prevLink.classList.remove('disabled');
            } else {
                prevLink.href = '#';
                prevLink.classList.add('disabled');
            }

            if (currentIndex < misOraciones.length - 1) {
                nextLink.href = misOraciones[currentIndex + 1].url;
                nextLink.classList.remove('disabled');
            } else {
                nextLink.href = '#';
                nextLink.classList.add('disabled');
            }

            // Generar widget "Más oraciones" (excluye la actual, máximo 4)
            const relatedGrid = document.getElementById('relatedGrid');
            let others = misOraciones.filter((item, idx) => idx !== currentIndex);
            const toShow = others.slice(0, 4);

            if (toShow.length === 0) {
                relatedGrid.innerHTML = '<p style="text-align:center;color:#a09280;">Pronto más oraciones disponibles.</p>';
            } else {
                let html = '';
                toShow.forEach(item => {
                    html += `
                        <a href="${item.url}" class="related-card">
                            <img src="${item.img}" alt="${item.titulo}" loading="lazy" />
                            <div class="info">
                                <h4>${item.titulo}</h4>
                                <p>Ver o leer completa</p>
                                <span class="mini-btn">➜ Abrir</span>
                            </div>
                        </a>
                    `;
                });
                relatedGrid.innerHTML = html;
            }

        })();
    </script>

</body>
</html>
